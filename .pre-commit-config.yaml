repos:
  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.8.6
    hooks:
      - id: ruff
        args: [--fix, --exit-non-zero-on-fix]
      - id: ruff-format

  - repo: local
    hooks:
      - id: web-eslint
        name: Web ESLint
        entry: bash -c 'cd apps/web && pnpm exec eslint --max-warnings 0 .'
        language: system
        files: ^apps/web/.*\.(ts|tsx)$
        pass_filenames: false

      - id: web-typecheck
        name: Web TypeScript
        entry: bash -c 'cd apps/web && pnpm exec tsc --noEmit'
        language: system
        files: ^apps/web/.*\.(ts|tsx)$
        pass_filenames: false

      - id: api-test-smoke
        name: API smoke tests
        entry: bash -c 'cd apps/api && poetry run pytest --tb=line -q -x --timeout=30'
        language: system
        files: ^apps/api/.*\.py$
        pass_filenames: false
        stages: [pre-push]
