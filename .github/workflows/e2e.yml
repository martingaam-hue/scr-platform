name: E2E Tests (Playwright)

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  e2e:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_DB: scr_test
          POSTGRES_USER: scr
          POSTGRES_PASSWORD: scr_password
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

      redis:
        image: redis:7
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v4

      - name: Install pnpm
        uses: pnpm/action-setup@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Install Playwright browsers
        run: pnpm --filter web exec playwright install chromium --with-deps

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install system dependencies for API
        run: sudo apt-get install -y libcairo2-dev pkg-config

      - name: Install API dependencies
        working-directory: apps/api
        run: pip install poetry && poetry install

      - name: Run migrations
        working-directory: apps/api
        env:
          DATABASE_URL: postgresql+asyncpg://scr:scr_password@localhost:5432/scr_test
        run: poetry run alembic upgrade head

      - name: Start API server
        working-directory: apps/api
        env:
          DATABASE_URL: postgresql+asyncpg://scr:scr_password@localhost:5432/scr_test
          REDIS_URL: redis://localhost:6379/0
          APP_ENV: test
          APP_DEBUG: "false"
          SECRET_KEY: ci-e2e-secret-key-not-for-production
          CLERK_SECRET_KEY: ${{ secrets.CLERK_SECRET_KEY_TEST }}
          CLERK_WEBHOOK_SECRET: test_webhook_secret
          AI_GATEWAY_URL: ${{ secrets.AI_GATEWAY_URL_TEST }}
          AI_GATEWAY_API_KEY: ${{ secrets.AI_GATEWAY_API_KEY_TEST }}
          AWS_ACCESS_KEY_ID: test
          AWS_SECRET_ACCESS_KEY: test
          AWS_S3_BUCKET: test-bucket
          AWS_S3_ENDPOINT_URL: http://localhost:9000
        run: poetry run uvicorn app.main:app --host 0.0.0.0 --port 8000 > /tmp/api.log 2>&1 &

      - name: Build internal packages
        run: |
          pnpm --filter @scr/types build
          pnpm --filter @scr/ui build

      - name: Build frontend
        working-directory: apps/web
        env:
          NEXT_PUBLIC_CLERK_PUBLISHABLE_KEY: ${{ secrets.NEXT_PUBLIC_CLERK_PUBLISHABLE_KEY_TEST }}
          CLERK_SECRET_KEY: ${{ secrets.CLERK_SECRET_KEY_TEST }}
          NEXT_PUBLIC_API_URL: http://localhost:8000
        run: pnpm build

      - name: Start frontend
        working-directory: apps/web
        env:
          NEXT_PUBLIC_CLERK_PUBLISHABLE_KEY: ${{ secrets.NEXT_PUBLIC_CLERK_PUBLISHABLE_KEY_TEST }}
          CLERK_SECRET_KEY: ${{ secrets.CLERK_SECRET_KEY_TEST }}
          NEXT_PUBLIC_API_URL: http://localhost:8000
        run: pnpm start > /tmp/web.log 2>&1 &

      - name: Wait for services
        run: |
          npx wait-on tcp:localhost:3000 http://localhost:8000/health --timeout 180000

      - name: Show server logs on failure
        if: failure()
        run: |
          echo "=== API log ===" && cat /tmp/api.log || true
          echo "=== Web log ===" && cat /tmp/web.log || true

      - name: Run Playwright tests
        working-directory: apps/web
        env:
          PLAYWRIGHT_BASE_URL: http://localhost:3000
          PLAYWRIGHT_API_URL: http://localhost:8000
          TEST_ALLY_EMAIL: ${{ secrets.TEST_ALLY_EMAIL }}
          TEST_ALLY_PASSWORD: ${{ secrets.TEST_ALLY_PASSWORD }}
          TEST_INVESTOR_EMAIL: ${{ secrets.TEST_INVESTOR_EMAIL }}
          TEST_INVESTOR_PASSWORD: ${{ secrets.TEST_INVESTOR_PASSWORD }}
        run: pnpm exec playwright test

      - name: Upload Playwright report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: playwright-report
          path: apps/web/playwright-report/
          retention-days: 30

      - name: Upload server logs
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: server-logs
          path: |
            /tmp/api.log
            /tmp/web.log
          retention-days: 7
